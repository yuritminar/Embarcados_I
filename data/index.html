<!DOCTYPE html>
<html lang="pt-br">
<head width:5%;>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    
    <title> T1 - Sistemas Embarcados</title>
    <!-- <meta http-equiv="refresh" content="1"> -->
    
    <style>
         body {
            
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("img/fundo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        .card-custom{
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            color:white;
        }

        .css_btn{
            width: 100%;
            margin-bottom: 10px;

        }

        .header, .footer {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            
        }
        .footer {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-top: auto;
            
        }


    </style>
    <meta htttp-equiv="refresh" content="1">

    
</head>
<body>
    <div class="header text-center mb-4">  
        <h2 style="color: rgba(121, 164, 235, 0.8)"> Sistemas Embarcados</h2>
        <small style="color: rgba(121, 164, 235, 0.8)">T1</small>
    </div>
    
    <div class="row g-4 justify-content-center" >
       
        <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> Temperatura</h6>
                    <div class="value text-center"><p>%TEMP% ºC</p>  </div>
            </div>
        </div>

        <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> Umidade</h6>
                    <div class="value text-center"><p>%UMID% %</p>  </div>
            </div>
        </div>

        <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> Pressão</h6>
                    <div class="value text-center"><p>%PRES% hPa</p>  </div>
            </div>
        </div>
      
    </div>
    <div class="row g-4 mt-1 justify-content-center">
       <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> CO2 </h6>
                    <div class="value text-center"><p>%CO% ppm</p>  </div>
            </div>
        </div>

        <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> Altitude </h6>
                    <div class="value text-center"><p>%ALT% m</p>  </div>
            </div>
        </div>

        <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                    <h6 class="text-center"> Ventilador </h6>
                    <div class="value text-center"><p>%VENT_STATUS% </p>  </div>
            </div>
        </div>
       
    </div> 
    <div class="row g-4 mt-5 justify-content-center">
         <div class="col-12 col-md-2">
            <div class="card card-custom p-1 ">
                <a href="/toggleRele" class="css_btn btn %BTN_CLASS%">
                    %BTN_TEXT%
                </a>
                <h6 class="text-center"> Status do Relé </h6>
                <div class="value text-center"><p>%RELE_STATUS% </p>  </div>     
            </div>
        </div>

    </div>
</br>
</br>
</br>
</br>


</body>
<footer class="footer text-center mb-4" style="color: rgba(243, 243, 243, 0.8)"> Trabalho 1 de Sistemas Embarcados 1 <br> feito por: Yuri Minar  </footer>
</html>
